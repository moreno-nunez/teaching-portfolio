format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    include-in-header:
      - text: |
          <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lora:wght@400;500;600&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    include-after-body:
      - text: |
          <footer class="site-footer">
              <div class="footer-social social-icons">
                <a href="https://scholar.google.com/citations?user=N9SVyYwAAAAJ&hl=es&oi=ao" aria-label="Google Scholar"><iconify-icon icon="academicons:google-scholar"></iconify-icon></a>
                <a href="https://orcid.org/0000-0002-0397-2513" aria-label="ORCID"><iconify-icon icon="academicons:orcid"></iconify-icon></a>
                <a href="https://www.researchgate.net/profile/Ana_Moreno_Nunez" aria-label="ResearchGate"><iconify-icon icon="academicons:researchgate"></iconify-icon></a>
                <a href="https://github.com/moreno-nunez" aria-label="GitHub"><iconify-icon icon="mdi:github"></iconify-icon></a>
                <a href="mailto:ana.moreno@uam.es" aria-label="Email"><iconify-icon icon="lucide:mail"></iconify-icon></a>
              </div>

            <div class="site-footer-center">
              <a class="back-to-top" href="#">↑ Back to top</a>
            </div>

            <div class="site-footer-message">© 2026 Ana Moreno Núñez · Portafolio docente</div>
          </footer>
          
            <script>
        document.addEventListener("DOMContentLoaded", function () {
          const footer = document.querySelector(".site-footer");
          if (!footer) return;

          let lastScrollY = window.scrollY;

          function toggleFooter() {
            const currentScrollY = window.scrollY;
            const scrollingDown = currentScrollY > lastScrollY;
            const nearBottom =
              window.innerHeight + currentScrollY >= document.documentElement.scrollHeight - 80;

           footer.classList.toggle("is-visible", nearBottom && scrollingDown);

          lastScrollY = currentScrollY;
        }

        window.addEventListener("scroll", toggleFooter, { passive: true });
        window.addEventListener("resize", toggleFooter);
        toggleFooter();
        });
        </script>